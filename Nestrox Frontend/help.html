<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nestrox — Help & Support. Get in touch with the Nestrox team.">
  <title>Nestrox — Help &amp; Support</title>
  <link rel="icon" href="../Nestrox Logo & Brand/Nestrox_Logo_No_Bg.png" type="image/png">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="help.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== Overlay for sidebars ===== -->
  <div class="overlay" id="overlay"></div>

  <!-- ===== Top Navigation Bar ===== -->
  <nav class="topnav" id="topnav">
    <!-- Left: Profile Icon -->
    <button class="nav-btn nav-btn--profile" id="btn-profile" aria-label="Open profile sidebar">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
    </button>

    <!-- Center: Brand Image -->
    <div class="nav-brand">
      <img src="../Nestrox Logo & Brand/Nestrox_Brand_No_Bg.png" alt="Nestrox" class="nav-brand-img">
    </div>

    <!-- Right: Notification Bell -->
    <button class="nav-btn nav-btn--bell" id="btn-bell" aria-label="Open notifications">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5S10.5 3.2 10.5 4v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </button>
  </nav>

  <!-- ===== Left Sidebar ===== -->
  <aside class="sidebar sidebar--left" id="sidebar-left">
    <div class="sidebar__header">
      <div class="sidebar__avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
      </div>
      <p class="sidebar__greeting">Welcome!</p>
    </div>
    <nav class="sidebar__menu">
      <button class="sidebar__item" id="menu-profile">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
        <span>Profile</span>
      </button>
      <button class="sidebar__item" id="menu-room-settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94 7.07 7.07 0 0 0-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.04 7.04 0 0 0-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0-.06.94c0 .32.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54a7.04 7.04 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
        <span>Room Settings</span>
      </button>
      <button class="sidebar__item" id="menu-settlements">
        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1H6.5c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.88-4.4z"/></svg>
        <span>Settlements</span>
      </button>
      <button class="sidebar__item" id="menu-app-settings">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <span>App Settings</span>
      </button>
      <button class="sidebar__item sidebar__item--active" id="menu-help">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
        <span>Help &amp; Support</span>
      </button>
      <div class="sidebar__divider"></div>
      <button class="sidebar__item sidebar__item--logout" id="menu-logout">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        <span>Logout</span>
      </button>
    </nav>
  </aside>

  <!-- ===== Right Notification Panel ===== -->
  <aside class="sidebar sidebar--right" id="sidebar-right">
    <div class="sidebar__header sidebar__header--notif">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5S10.5 3.2 10.5 4v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <p>Notifications</p>
    </div>
    <div class="notif-empty">
      <svg class="notif-empty__icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5S10.5 3.2 10.5 4v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <p class="notif-empty__text">No new notifications</p>
    </div>
  </aside>

  <!-- ===== Main Content ===== -->
  <main class="help-main" id="help-main">
    <div class="help-card" role="region" aria-labelledby="help-title">

      <!-- Icon -->
      <div class="help-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
        </svg>
      </div>

      <!-- Heading -->
      <h1 class="help-card__title" id="help-title">Help &amp; Support</h1>

      <!-- Message -->
      <p class="help-card__message">We are happy to help <span aria-label="smiley">:)</span></p>

      <!-- Divider -->
      <div class="help-card__divider" aria-hidden="true"></div>

      <!-- Contact section -->
      <p class="help-card__contact-label">Reach us at</p>
      <a
        id="support-email-link"
        class="help-card__email"
        href="mailto:nestroxsupport@gmail.com"
        aria-label="Email Nestrox support at nestroxsupport@gmail.com"
      >nestroxsupport@gmail.com</a>

      <!-- No email client fallback message -->
      <p id="no-email-client-msg" class="help-card__no-client" role="alert" aria-live="polite">
        📬 No email app is set up on this device. Please send us an email manually to
        <strong>nestroxsupport@gmail.com</strong>
      </p>

      <!-- Back button -->
      <button class="help-card__back" id="btn-back" aria-label="Go back to dashboard">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Dashboard
      </button>

    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="dash-footer">
    <p>&copy; 2026 Nestrox. All rights reserved.</p>
  </footer>

  <script src="help.js"></script>
</body>
</html>
